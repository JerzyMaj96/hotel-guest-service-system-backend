services:
  postgres:
    image: postgres:16-alpine
    container_name: hotel-db-container
    env_file:
      - fragile.env
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: hotel_guest_service_system
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    image: jerzyk437/hgss-backend:1.5
    container_name: hgss-backend-container
    env_file:
      - fragile.env
    environment:
      JWT_SECRET: ${JWT_SECRET}
      DOCKER_DB_USERNAME: ${DB_USERNAME}
      DOCKER_DB_PASSWORD: ${DB_PASSWORD}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    container_name: hotel-mailpit-container
    ports:
      - "1026:1025"
      - "8026:8025"
    restart: unless-stopped

volumes:
  postgres_data: