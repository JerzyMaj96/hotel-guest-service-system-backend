spring:
  application:
    name: hotel-guest-service-system
  profiles:
    active: dev

logging:
  level:
    root: INFO
    com.jerzymaj.hotel_guest_service_system: DEBUG

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 604800000
  http:
    allowed-origins: "${ALLOWED_ORIGIN:http://localhost:5173}"

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/hotel_guest_service_system
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  mail:
    host: localhost
    port: 1025
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false

